name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configurar PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3, zip
          coverage: none
          tools: composer:v2

      - name: Localizar cache do Composer
        id: composer-cache
        run: echo "directory=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Restaurar cache do Composer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validar dependencias
        run: composer validate --strict --no-check-publish

      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar aplicacao
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Verificar padrao de codigo
        run: vendor/bin/pint --test

      - name: Executar testes
        run: php artisan test

      - name: Auditar dependencias
        run: composer audit --locked --no-interaction

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Auditar dependencias de execucao
        run: npm audit --audit-level=high --omit=dev

      - name: Executar testes
        run: npm test -- --watch=false --browsers=ChromeHeadless
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: Gerar build
        run: npm run build

      - name: Disponibilizar build para verificacao
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-${{ github.sha }}
          path: frontend/dist/starian-checklist/browser
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker Compose
    needs:
      - backend
      - frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validar configuracao
        run: docker compose config --quiet

      - name: Construir imagens
        run: docker compose build

  pages-build:
    name: GitHub Pages / Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar ambiente online
        run: npm run build -- --configuration pages --base-href "${{ steps.pages.outputs.base_path }}/"

      - name: Preparar artefato do GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: frontend/dist/starian-checklist/browser

  pages-deploy:
    name: GitHub Pages / Publicar
    needs: pages-build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar ambiente online
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
