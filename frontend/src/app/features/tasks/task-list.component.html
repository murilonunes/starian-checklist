<main class="page-shell">
  <section class="task-card" aria-labelledby="task-list-title">
    <app-task-header
      [loading]="loading()"
      [hasError]="!!errorMessage()"
      [remainingCount]="remainingCount()"
    />
    <app-task-create (taskCreated)="addCreatedTask($event)" />
    <app-task-collection
      [tasks]="tasks()"
      [loading]="loading()"
      [errorMessage]="errorMessage()"
      [pendingTaskIds]="pendingTaskIds()"
      (retryRequested)="loadTasks()"
      (toggleRequested)="toggleTask($event)"
      (removeRequested)="removeTask($event)"
    />
  </section>
</main>
